{{- if .Values.HTTPToHTTPSRedirectFilter.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ printf "%s-http-redirect-filter" (include "envoy-gateway.fullname" .) }}
  namespace: {{ .Release.Namespace | quote }}
  labels:
{{ include "envoy-gateway.labels" . | indent 4 }}
spec:
  parentRefs:
  - name: {{ include "envoy-gateway.fullname" . }}
    sectionName: {{ .Values.HTTPToHTTPSRedirectFilter.gatewayHTTPListenerName }}
    namespace: {{ .Release.Namespace | quote }}
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
        statusCode: {{ .Values.HTTPToHTTPSRedirectFilter.redirectStatusCode }}
{{- end }}
